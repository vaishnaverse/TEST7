<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | Classonn+</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>

<body class="bg-white">

    <!-- 🔥 NAVBAR -->
    <nav class="bg-white shadow-md fixed w-full z-50">
        <div class="container mx-auto flex justify-between items-center px-4 py-3">
            <a href="index.html"><img src="images/logo.png" class="h-14 md:h-16"></a>

            <ul class="hidden md:flex gap-6 text-black font-medium">
                <li><a href="index.html" class="hover:text-yellow-500">Home</a></li>
                <li><a href="products.html" class="text-yellow-500 font-semibold">Products</a></li>
                <li><a href="about.html" class="hover:text-yellow-500">About</a></li>
                <li><a href="contact.html" class="hover:text-yellow-500">Contact</a></li>
            </ul>

            <button id="menu-btn" class="md:hidden text-2xl">☰</button>
        </div>

        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden bg-white px-6 pb-4 shadow-md md:hidden">
            <a href="index.html" class="block py-3 border-b">Home</a>
            <a href="products.html" class="block py-3 border-b">Products</a>
            <a href="about.html" class="block py-3 border-b">About</a>
            <a href="contact.html" class="block py-3">Contact</a>
        </div>
    </nav>

    <!-- 🔥 HEADER -->
    <section class="pt-28 pb-10 text-center bg-black text-white">
        <h1 class="text-3xl md:text-5xl font-bold">Our Notebooks</h1>
        <p class="text-gray-300 mt-2">Find the perfect notebook for your needs</p>
    </section>

    <!-- 🔥 FILTERS -->
    <section class="py-6">
        <div class="container mx-auto px-4">

            <!-- Size Filters -->
            <div class="flex flex-wrap gap-3 justify-center mb-4">
                <button class="filter-btn bg-black text-white px-4 py-2 rounded-full" data-filter="all">All</button>
                <button class="filter-btn border px-4 py-2 rounded-full" data-filter="A4">A4</button>
                <button class="filter-btn border px-4 py-2 rounded-full" data-filter="A5">A5</button>
                <button class="filter-btn border px-4 py-2 rounded-full" data-filter="Jumbo">Jumbo</button>
                <button class="filter-btn border px-4 py-2 rounded-full" data-filter="Drawing">Drawing</button>
            </div>

            <!-- Type Filters -->
            <div class="flex flex-wrap gap-3 justify-center">
                <button class="type-btn border px-4 py-2 rounded-full" data-type="all">All Types</button>
                <button class="type-btn border px-4 py-2 rounded-full" data-type="Ruled">Ruled</button>
                <button class="type-btn border px-4 py-2 rounded-full" data-type="Plain">Plain</button>
            </div>

        </div>
    </section>

    <!-- 🔥 PRODUCTS GRID -->
    <section class="pb-16">
        <div class="container mx-auto px-4">
            <div id="product-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            </div>
        </div>
    </section>

    <!-- 🔥 FOOTER -->
    <footer class="bg-black text-white text-center py-6">
        <p>© 2026 Classonn+ | All Rights Reserved</p>
    </footer>

    <!-- 🔥 SCRIPT -->
    <script>
        function viewProduct(name, price, img, category, type) {
            let url = `product-details.html?name=${encodeURIComponent(name)}&price=${price}&img=${img}&category=${category}&type=${type}`;
            window.location.href = url;
        }

        $(document).ready(function () {

            // Mobile Menu
            $("#menu-btn").click(function () {
                $("#mobile-menu").slideToggle();
            });

            let selectedFilter = "all";
            let selectedType = "all";

            // Product Data (can later move to JSON file)
            let products = [
                { name: "A4 Ruled Notebook", category: "A4", type: "Ruled", price: "₹120", img: "images/n5.png" },
                { name: "A4 Plain Notebook", category: "A4", type: "Plain", price: "₹110", img: "images/n1.png" },
                { name: "A5 Ruled Notebook", category: "A5", type: "Ruled", price: "₹90", img: "images/n6.png" },
                { name: "Jumbo Notebook", category: "Jumbo", type: "Ruled", price: "₹180", img: "images/n3.png" },
                { name: "Drawing Book", category: "Drawing", type: "Plain", price: "₹150", img: "images/n4.png" },
                { name: "A5 Plain Notebook", category: "A5", type: "Plain", price: "₹85", img: "images/n2.png" }
            ];

            function displayProducts() {
                let html = "";

                let filtered = products.filter(p => {
                    return (selectedFilter === "all" || p.category === selectedFilter) &&
                        (selectedType === "all" || p.type === selectedType);
                });

                filtered.forEach(p => {
                    html += `
            <div class="bg-white p-4 rounded-xl shadow hover:shadow-2xl hover:-translate-y-2 transition duration-300">
                <img src="${p.img}" class="w-full h-40 object-cover rounded">
                <h3 class="mt-3 font-semibold">${p.name}</h3>
                <p class="text-black font-bold">${p.price}</p>
                <button onclick="viewProduct('${p.name}','${p.price}','${p.img}','${p.category}','${p.type}')"
                    class="mt-2 bg-black text-white px-4 py-2 rounded-full hover:bg-gray-800 transition">
                    View Details
                </button>
            </div>
            `;
                });

                $("#product-container").html(html);
            }

            displayProducts();

            // Category Filter
            $(".filter-btn").click(function () {
                selectedFilter = $(this).data("filter");

                $(".filter-btn").removeClass("bg-black text-white");
                $(this).addClass("bg-black text-white");

                displayProducts();
            });

            // Type Filter
            $(".type-btn").click(function () {
                selectedType = $(this).data("type");

                $(".type-btn").removeClass("bg-black text-white");
                $(this).addClass("bg-black text-white");

                displayProducts();
            });

        });
    </script>

</body>

</html>
